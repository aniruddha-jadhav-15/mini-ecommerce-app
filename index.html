<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini E-Commerce</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
  </head>
  <body>
    <!-- ============ NAVBAR ============ -->
    <nav class="navbar">
      <div class="navbar__logo">Shop<span>Cart</span></div>

      <div class="navbar__actions">
        <button class="cart-trigger" id="cartTrigger">
          <i class="ti ti-shopping-cart"></i>
          <span class="cart-text">Cart</span>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </nav>

    <main>
      <!-- ============ HERO ============ -->
      <section class="hero">
        <div class="hero__text">
          <span class="hero__tag">🔥New Arrival</span>
          <h2 class="hero__title">Sony WH-1000XM5 Headphones</h2>
          <p class="hero__sub">
            Industry leading noise cancellation. 30hr battery.
          </p>
          <button class="hero__btn">Shop Now →</button>
        </div>
        <div class="hero__image">
          <img
            src="https://images.unsplash.com/photo-1657223143970-08cc5afe9943?w=1000&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fHdpcmVsZXNzJTIwaGVhZHBob25lc3xlbnwwfHwwfHx8MA%3D%3D"
            alt=""
          />
        </div>
      </section>

      <!-- ============ CONTROLS ============ -->
      <section class="controls">
        <div class="controls__search">
          <input
            class="inpt-box"
            type="text"
            placeholder="Search products..."
          />
          <button class="search-btn" id="searchBtn">
            <i class="ti ti-search"></i>
          </button>
        </div>
        <div class="controls__filters">
          <select class="filter-select" id="category-dropdown">
            <option value="all">All Categories</option>
          </select>
          <select class="filter-select" id="sort-option">
            <option value="default">Default</option>
            <option value="low-high">Low → High</option>
            <option value="high-low">High → Low</option>
          </select>
        </div>
      </section>

      <!-- ============ PRODUCTS ============ -->
      <section class="products">
        <div class="products__header">
          <h2 class="products__title">All Products</h2>
          <span class="products__count" id="productsCount"></span>
        </div>
        <div class="products-container" id="productsGrid"></div>
        <div class="message-container" id="messageContainer"></div>
      </section>
    </main>

    <!-- overlay — dark background when cart opens -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <!-- ============ CART DRAWER ============ -->
    <div class="cart-drawer" id="cartDrawer">
      <div class="cart-drawer__handle"></div>
      <div class="cart-drawer__header">
        <h2 class="cart-drawer__title">Your Cart</h2>
        <button class="cart-drawer__close" id="cartClose">
          <i class="ti ti-x"></i>
        </button>
      </div>
      <div class="cart-drawer__items" id="cartItems">
        <!-- filled by JavaScript -->
      </div>
      <div class="cart-drawer__footer">
        <div class="cart-drawer__total">
          <span>Total</span>
          <span id="cartTotal">$0.00</span>
        </div>
        <button class="cart-drawer__checkout">Proceed to Checkout →</button>
      </div>
    </div>

    <div class="cart-empty" id="cartEmpty">
      <i class="ti ti-shopping-cart-off"></i>
      <p>Your cart is empty</p>
    </div>

    <div class="products-container"></div>
    <div class="load-more-wrap">
      <button class="load-more-btn" id="loadMoreBtn">Load More</button>
    </div>
    <div class="message-container"></div>

    <script type="module" src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        console.log(
          "searchBtn in HTML script:",
          document.querySelector("#searchBtn"),
        );
      });
    </script>
  </body>
</html>
